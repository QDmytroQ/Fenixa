version: '3.8'

services:
  fenixa-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fenixa-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
    ports:
      - "${DB_PORT}:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  fenixa-db-ui:
    image: dbgate/dbgate
    container_name: fenixa-db-ui
    restart: always
    ports:
      - "${DB_UI_PORT}:3000"
    depends_on:
      fenixa-db:
        condition: service_healthy

  fenixa-redis:
    image: redis:7-alpine
    container_name: fenixa-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  fenixa-backend:
    image: fenixa-backend
    container_name: fenixa-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${APP_ENV}
      - ConnectionStrings__DefaultConnection=Server=fenixa-db;Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=fenixa-redis:6379,abortConnect=false
    secrets:
      - source: backend_private_key
        target: /app/keys/private.pem
        mode: 0444
      - source: backend_public_key
        target: /app/keys/public.pem 
        mode: 0444
    depends_on:
      fenixa-db:
        condition: service_healthy
      fenixa-redis:
        condition: service_healthy

volumes:
  mssql-data:
  redis-data:
secrets:
  backend_private_key:
    file: ./secrets/private.pem
  backend_public_key:               
    file: ./secrets/public.pem  